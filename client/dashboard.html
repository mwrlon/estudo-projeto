<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>

  <body class="bg-slate-200 min-h-screen">
    <aside id="sidebar" class="flex fixed top-0 left-0 w-24 h-screen bg-indigo-800 text-white flex-col justify-between shadow-lg">
      <div>
        <p class="flex m-6 text-4xl font-bold">
          <a href="dashboard.html" id="titulo" class="hidden">Wedding Pass</a>
          <button id="sideBarToggle" class="flex m-2 text-3xl font-bold cursor-pointer"> ➔ </button>
        </p>

        <nav class="hidden">
          <ul class="mt-12">
            <li class="mx-4 my-3">
              <a
                href="dashboard.html"
                class="block px-6 py-3 rounded-2xl font-bold bg-slate-100 text-indigo-800"
              >
                Dashboard
              </a>
            </li>

            <li class="mx-4 my-3">
              <a
                href="convidados.html"
                class="block px-6 py-3 rounded-2xl font-bold hover:bg-indigo-700 transition"
              >
                Convidados
              </a>
            </li>

            <li class="mx-4 my-3">
              <a
                href="checkin.html"
                class="block px-6 py-3 rounded-2xl font-bold hover:bg-indigo-700 transition"
              >
                Check-in
              </a>
            </li>
          </ul>
        </nav>
      </div>

      <div class="p-4">
        <button id="botaoSair"
          onclick="logout()"
          class="hidden w-full cursor-pointer p-3 font-bold bg-slate-100 text-indigo-900 rounded-2xl hover:bg-slate-300 transition"
        >
          Sair
        </button>
      </div>
    </aside>

    <main class="p-6 ml-24">
      <h1 class="text-5xl font-bold text-slate-800 ">Dashboard</h1>
      <p class="text-lg font-thin text-slate-800 mb-8">Visão geral do evento</p>

      <div class="flex flex-col justify-around">
        <div class="bg-white rounded-2xl shadow-lg p-6 mb-8 max-w-sm">
            <p class="text-slate-500 text-sm uppercase">
            Total de Convidados
            </p>

            <p id="total" class="text-5xl font-bold text-indigo-800 mt-2">0</p>
        </div>

        <div class="bg-white rounded-2xl shadow-lg p-6 mb-8 max-w-sm">
            <p class="text-slate-500 text-sm uppercase">
            Total de Pendentes
            </p>

            <p id="pendentes" class="text-5xl font-bold text-indigo-800 mt-2">0</p>
        </div>

        <div class="bg-white rounded-2xl shadow-lg p-6 mb-8 max-w-sm">
            <p class="text-slate-500 text-sm uppercase">
            Total de Confirmados
            </p>

            <p id="confirmados" class="text-5xl font-bold text-indigo-800 mt-2">0</p>
        </div>
      </div>
        <div id="ultimos-checkin" class="flex flex-col  bg-white mt-6 w-full h-92 rounded-4xl shadow-lg">
          <p class="mx-8 my-4 text-green-700 font-semibold">Ultimos check-ins</p>
          <div class="flex bg-slate-200/60 text-slate-800 p-5 rounded-2xl justify-between m-4 shadow-lg"> 
            <p id="nome" class="flex self-center font-semibold ">Nome convidado</p>
            <p class="font-medium">Mesa <br><span id="mesa" class="font-bold">0</span></p>
          </div>
        </div>
    </main>
    <script src="./scripts/dashboard.js"></script>
  </body>
</html>
