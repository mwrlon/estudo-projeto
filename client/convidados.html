<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>

  <body class="bg-slate-200 min-h-screen">
    <aside
      id="sidebar"
      class="flex fixed top-0 left-0 w-24 h-screen bg-indigo-800 text-white flex-col justify-between shadow-lg"
    >
      <div>
        <p class="flex m-6 text-4xl font-bold">
          <a href="dashboard.html" id="titulo" class="hidden">Wedding Pass</a>
          <button
            id="sideBarToggle"
            class="flex m-2 text-3xl font-bold cursor-pointer"
          >
            ➔
          </button>
        </p>

        <nav class="hidden">
          <ul class="mt-12">
            <li class="mx-4 my-3">
              <a
                href="dashboard.html"
                class="block px-6 py-3 rounded-2xl font-bold bg-slate-100 text-indigo-800"
              >
                Dashboard
              </a>
            </li>

            <li class="mx-4 my-3">
              <a
                href="convidados.html"
                class="block px-6 py-3 rounded-2xl font-bold hover:bg-indigo-700 transition"
              >
                Convidados
              </a>
            </li>

            <li class="mx-4 my-3">
              <a
                href="checkin.html"
                class="block px-6 py-3 rounded-2xl font-bold hover:bg-indigo-700 transition"
              >
                Check-in
              </a>
            </li>
          </ul>
        </nav>
      </div>

      <div class="p-4">
        <button
          id="botaoSair"
          onclick="logout()"
          class="hidden w-full cursor-pointer p-3 font-bold bg-slate-100 text-indigo-900 rounded-2xl hover:bg-slate-300 transition"
        >
          Sair
        </button>
      </div>
    </aside>

    <main class="p-6 ml-24">
      <h1 class="text-5xl font-bold text-slate-800">Convidados</h1>
      <p class="text-lg font-thin text-slate-800 mb-8">
        Gerenciamento de convidados
      </p>

      <div class="flex">
        <input
          type="search"
          placeholder="Busque por nome ou CPF..."
          class="italic w-full bg-white/50 rounded-2xl p-6 shadow-md focus:outline-none focus:ring-2 focus:ring-indigo-500"
        />

        <button
          class="bg-indigo-800 text-white rounded-2xl px-6 mx-4 hover:bg-indigo-900 transition cursor-pointer"
        >
          + Novo Convidado
        </button>
      </div>

      <div
        id="convidados-total"
        class="flex flex-col bg-white/50 mt-12 rounded-4xl shadow-lg p-6"
      >
        <p class="text-indigo-900 font-bold text-xl mb-4">Convidados</p>

        <div
          class="bg-slate-100 rounded-3xl p-5 shadow-md hover:shadow-lg transition"
        >
          <div class="flex justify-between items-start">
            <div>
              <p id="nome" class="text-lg font-bold text-slate-800">
                Nome convidado
              </p>

              <p id="email" class="text-slate-600 mt-1">email@email.com</p>
            </div>

            <div class="flex gap-2">
              <button
                class="cursor-pointer p-2 rounded-xl hover:bg-slate-200 transition"
                onclick="editar()"
              >
                ✏️
              </button>

              <button
                class="cursor-pointer p-2 rounded-xl hover:bg-red-100 transition"
                onclick="excluir()"
              >
                🗑️
              </button>
            </div>
          </div>

          <div
            class="border-t border-slate-300 mt-4 pt-4 flex justify-between items-center"
          >
            <div>
              <p id="cpf" class="font-medium text-slate-700">
                CPF: 000.000.000-00
              </p>
            </div>

            <div>
              <span
                class="bg-indigo-100 text-indigo-800 px-3 py-1 rounded-full font-semibold"
              >
                Mesa <span id="mesa">0</span>
              </span>
            </div>
          </div>
        </div>
      </div>
    </main>
  </body>
  <script src="./scripts/convidados.js"></script>
</html>
